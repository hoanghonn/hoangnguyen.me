local_backend: true

backend:
  name: git-gateway

media_folder: public/images/blog
public_folder: /images/blog

collections:
  - name: blog
    label: Blog Posts
    folder: src/content/blog
    create: true
    delete: true
    extension: md
    format: frontmatter
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - label: Category
        name: category
        widget: select
        options: [Technology, Trail Running]
      - { label: Date, name: date, widget: date, format: YYYY-MM-DD }
      - { label: Read Time, name: readTime, widget: string, default: "5 min read" }
      - { label: Slug, name: slug, widget: string, hint: "URL path under /post/, e.g. my-first-50km-trail-marathon" }
      - label: Cover Style
        name: cover
        widget: select
        options: [empty, illustration, gradient, photo]
        default: empty
      - { label: Cover Gradient (optional), name: coverGradient, widget: string, required: false }
      - { label: Cover Image, name: coverImage, widget: image, required: false, choose_url: false }
      - label: Gallery (photos)
        name: gallery
        widget: list
        required: false
        label_singular: Photo
        summary: "{{fields.alt}}"
        fields:
          - { label: Image, name: src, widget: image, choose_url: false }
          - { label: Alt text, name: alt, widget: string, required: false }
      - { label: Body, name: body, widget: markdown }
